DATA:
  NAME: SMD
  INPUT_DIR: data_npz/SMD

SEEDS: [0, 1, 2, 3]

TRAIN:
  BATCH_SIZE: 512
  EVAL_EVERY: 5

TEST:
  BATCH_SIZE: 512

SOLVER:
  MAX_EPOCH: 80
  BASE_LR: 0.0005
  GRADIENT_CLIP: 1.0

PICAAD:
  PRIOR:
    TYPE: pcmci
    PCMCI:
      ALPHA: 0.05
      SUBSAMPLE: 10000
  SCORING:
    CALIBRATE: False

EVAL:
  USE_MEDIAN_VUS_WINDOW: True
  DIAGNOSE_COMPONENTS: True
